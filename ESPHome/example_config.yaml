# Complete ESPHome configuration for Hisense AC component
# This configuration provides full* AC control and monitoring via Home Assistant

substitutions:
  device_name: ac-bedroom
  upper_name: AC Bedroom
  #device_name: ac-guestroom
  #upper_name: AC Guestroom

esphome:
  name: ${device_name}
  friendly_name: ${upper_name}
  platformio_options:
    platform_packages:
      - framework-arduino-api @ https://github.com/hn/ArduinoCore-API#RingBufferFix

#esp32:
#  board: esp32dev
#  framework:
#    type: arduino
    
rtl87xx:
  board: generic-rtl8710bn-2mb-788k

# Configure safe mode 
#safe_mode:
#  disabled: false
#  reboot_timeout: 10min
#  num_attempts: 5

external_components:
  - source:
      type: git
      url: https://github.com/kadam12g/AEH-W4G2-ESPHome
      path: ESPHome/my_components
    components: [hisense_ac]

# Logging configuration - UART0 disabled to avoid conflicts
logger:
  level: INFO
  baud_rate: 0  # Disable UART0 logging to avoid conflicts with AC communication

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "${upper_name} Hotspot"
    password: !secret hotspot_password

# Optional web server for debugging
web_server:
  port: 80

# UART configuration for AC communication
uart:
  id: ac_uart
  tx_pin: PA23 #GPIO1  # Adjust pins according to your wiring
  rx_pin: PA18 #GPIO3  # Adjust pins according to your wiring
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  debug:
    direction: BOTH
    dummy_receiver: true
    after:
      delimiter: [0xF4, 0xFB]  # Wait for complete AC messages
    sequence:
      - lambda: |-
          // Create hex string for logging
          std::string hex_str = "";
          for (size_t i = 0; i < bytes.size(); i++) {
            if (i > 0) hex_str += " ";
            hex_str += str_snprintf("0x%02X", 5, bytes[i]);
          }
          
          // Log with INFO level instead of DEBUG
          if (direction == UART_DIRECTION_TX) {
            ESP_LOGI("uart_ac", "TX (%zu bytes): %s", bytes.size(), hex_str.c_str());
          } else {
            ESP_LOGI("uart_ac", "RX (%zu bytes): %s", bytes.size(), hex_str.c_str());
          }
          // Log all UART communication for debugging
          //UARTDebug::log_hex(direction, bytes, ' ');
          //ESP_LOGI("uart_debug", "Received %zu bytes", bytes.size());
          
          // Pass received messages to the Hisense AC component
          if (direction == UART_DIRECTION_RX && id(hisense_climate) != nullptr) {
            std::vector<uint8_t> data(bytes.begin(), bytes.end());
            id(hisense_climate).on_uart_message(data);
          }

# Add the Hisense AC climate component
climate:
  - platform: hisense_ac
    name: "Hisense AC"
    id: hisense_climate
    uart_id: ac_uart
    flow_control_pin: PA14 #W4G2 needs it
    on_state:
      then:
        - lambda: |-
            // Update display switch based on AC's actual display state
            if (id(hisense_climate) != nullptr && id(hisense_climate).is_ready()) {
              id(ac_power_sw).publish_state(id(hisense_climate).get_power_status());
              id(ac_display).publish_state(id(hisense_climate).get_display_on());
              id(ac_boost_sw).publish_state(id(hisense_climate).get_boost_mode_status());
              id(ac_eco_sw).publish_state(id(hisense_climate).get_eco_mode_status());
              id(ac_quiet_sw).publish_state(id(hisense_climate).get_quiet_mode_status());
              id(ac_sleep_sw).publish_state(id(hisense_climate).get_sleep_status());
              id(sleep_mode_select).publish_state(id(hisense_climate).get_preferred_sleep_mode_string());
            }

# Debug controls for state machine
switch:
  - platform: template
    name: "AC Auto Execution"
    id: ac_auto_execution
    icon: "mdi:play-pause"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(hisense_climate).set_automatic_execution(true);
    turn_off_action:
      - lambda: |-
          id(hisense_climate).set_automatic_execution(false);
          
