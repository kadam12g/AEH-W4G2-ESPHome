select:
  - platform: template
    name: "Sleep Mode"
    id: sleep_mode_select
    icon: "mdi:sleep"
    options:
      - "Sleep (General)"
      - "Sleep for Young"
      - "Sleep for Old"
      - "Sleep for Kids"
    initial_option: "Sleep (General)"
    restore_value: true
    set_action:
      - lambda: |-
          id(hisense_climate).set_preferred_sleep_mode(x);
          
