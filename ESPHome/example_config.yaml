# Test buttons for AC initialization and debug controls
button:
  - platform: template
    name: "AC Manual Step"
    id: ac_manual_step
    icon: "mdi:step-forward"
    on_press:
      - lambda: |-
          id(hisense_climate).trigger_manual_step();

  - platform: template
    name: "AC Init 1"
    id: ac_init_1
    on_press:
      then:
        - uart.write:
            id: ac_uart
            data: [0xF4, 0xF5, 0x00, 0x40, 0x0B, 0x00, 0x00, 0x00, 0x00, 0xFE, 0x01, 0x00, 0x00, 0x0A, 0x04, 0x00, 0x01, 0x58, 0xF4, 0xFB]
        - logger.log: "Sent AC Init Message 1"

  - platform: template
    name: "AC Init 2"
    id: ac_init_2
    on_press:
      then:
        - uart.write:
            id: ac_uart
            data: [0xF4, 0xF5, 0x00, 0x40, 0x0B, 0x00, 0x00, 0x01, 0x01, 0xFE, 0x01, 0x00, 0x00, 0x07, 0x01, 0x00, 0x01, 0x54, 0xF4, 0xFB]
        - logger.log: "Sent AC Init Message 2"

  - platform: template
    name: "AC Init 3"
    id: ac_init_3
    on_press:
      then:
        - uart.write:
            id: ac_uart
            data: [0xF4, 0xF5, 0x00, 0x40, 0x0B, 0x00, 0x00, 0x01, 0x01, 0xFE, 0x01, 0x00, 0x00, 0x66, 0x40, 0x00, 0x01, 0xF2, 0xF4, 0xFB]
        - logger.log: "Sent AC Init Message 3 (Status Request)"

  - platform: template
    name: "AC Status Query"
    id: ac_status_query
    on_press:
      then:
        - uart.write:
            id: ac_uart
            data: [0xF4, 0xF5, 0x00, 0x40, 0x0C, 0x00, 0x00, 0x01, 0x01, 0xFE, 0x01, 0x00, 0x00, 0x66, 0x00, 0x00, 0x00, 0x01, 0xB3, 0xF4, 0xFB]
        - logger.log: "Sent AC Status Query"

interval:
  - interval: 5s
    then:
      - component.update: ac_sleep_mode
      - component.update: ac_mode_status
      - lambda: |-
          if (id(hisense_climate) != nullptr && id(hisense_climate).is_ready()) {
            id(ac_power_sw).publish_state(id(hisense_climate).get_power_status());
            id(ac_poweron_enabled).publish_state(id(hisense_climate).is_poweron_enabled());
            id(ac_poweroff_enabled).publish_state(id(hisense_climate).is_poweroff_enabled());
            id(ac_vertical_swing).publish_state(id(hisense_climate).get_up_down_status());
            id(ac_horizontal_swing).publish_state(id(hisense_climate).get_left_right_status());
            id(ac_eeprom).publish_state(id(hisense_climate).get_indoor_eeprom());
            id(ac_display).publish_state(id(hisense_climate).get_display_on());
            id(ac_boost_sw).publish_state(id(hisense_climate).get_boost_mode_status());
            id(ac_eco_sw).publish_state(id(hisense_climate).get_eco_mode_status());
            id(ac_quiet_sw).publish_state(id(hisense_climate).get_quiet_mode_status());
            id(ac_sleep_sw).publish_state(id(hisense_climate).get_sleep_status());
            id(sleep_mode_select).publish_state(id(hisense_climate).get_preferred_sleep_mode_string());
          }
