# ESPHome config — Original AEH-W4G2 hardware, full features, NO OTA
# More info: https://github.com/kadam12g/AEH-W4G2-ESPHome
#
# USE WHEN: You want full features (HA native API + web server) on the original
# AEH-W4G2 board and are happy to reflash via UART when you need to update firmware.
#
# Uses the 788k flash layout on the original 1MB chip — the full firmware fits,
# but OTA is intentionally omitted. Attempting OTA with 788k layout on a 1MB chip
# would write outside the physical flash and brick the device, requiring UART reflash.
# If you want OTA on the original chip, use example_config_AEH-W4G2_orig_ota.yaml
# (trimmed firmware, MQTT only).

substitutions:
  device_name: ac-aeh-w4g2-orig
  upper_name: AEH-W4G2 AC

esphome:
  name: ${device_name}
  friendly_name: ${upper_name}
  platformio_options:
    platform_packages:
      - framework-arduino-api @ https://github.com/hn/ArduinoCore-API#RingBufferFix

rtl87xx:
  board: generic-rtl8710bn-2mb-788k

external_components:
  - source:
      type: git
      url: https://github.com/kadam12g/AEH-W4G2-ESPHome
      path: my_components
    components: [hisense_ac]

packages:
  base: github://kadam12g/AEH-W4G2-ESPHome/examples/base.yaml@main

logger:
  level: WARN
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${upper_name} Hotspot"
    password: !secret hotspot_password
