# ESPHome config — Original AEH-W4G2 hardware, OTA capable
# More info: https://github.com/kadam12g/AEH-W4G2-ESPHome
#
# USE WHEN: You want to flash the original AEH-W4G2 board AND keep OTA updates.
#
# TRADE-OFF: Uses MQTT instead of the HA native API to fit within the original
# chip's smaller OTA flash partition (468k). You need an MQTT broker
# (e.g. the Mosquitto add-on in Home Assistant).
#
# Flash usage: ~94% of the 468k OTA partition — fits with ~30KB headroom.

substitutions:
  device_name: ac-aeh-w4g2-orig-ota
  upper_name: AEH-W4G2 AC

esphome:
  name: ${device_name}
  friendly_name: ${upper_name}
  platformio_options:
    platform_packages:
      - framework-arduino-api @ https://github.com/hn/ArduinoCore-API#RingBufferFix

rtl87xx:
  board: generic-rtl8710bn-2mb-468k

external_components:
  - source:
      type: git
      url: https://github.com/kadam12g/AEH-W4G2-ESPHome
      path: my_components
    components: [hisense_ac]

packages:
  base: github://kadam12g/AEH-W4G2-ESPHome/examples/base.yaml@main

logger:
  level: WARN
  baud_rate: 0

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_username
  password: !secret mqtt_password

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${upper_name} Hotspot"
    password: !secret hotspot_password
